services:
  postgres:
    image: postgres:15-alpine
    container_name: zeitkapsel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeitkapsel
      POSTGRES_PASSWORD: zeitkapsel
      POSTGRES_DB: zeitkapsel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
